<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cupones - ZupponPy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .page-wrap { display: flex; flex-direction: column; min-height: 100vh; }
        .page-content { flex: 1; }

        .cupones-grid {
            padding: 20px 16px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .cupon-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.18s, border-color 0.18s;
        }
        .cupon-card:hover { transform: translateY(-2px); border-color: var(--border-md); }

        .cupon-head {
            padding: 22px 22px 18px;
            background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(219,39,119,0.15));
            position: relative;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .cupon-head-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            border-radius: 0;
        }
        .cupon-head-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
        }
        .cupon-head > *:not(.cupon-head-bg):not(.cupon-head-overlay) { position: relative; z-index: 1; }
        .cupon-head.canjeado { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(5,150,105,0.1)); }
        .cupon-head.expirado { background: rgba(255,255,255,0.03); }

        .cupon-negocio { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
        .cupon-nombre { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1.3; margin-bottom: 12px; }

        .cupon-estado { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px; padding: 4px 13px; font-size: 0.75rem; font-weight: 700; }
        .cupon-estado.activo  { background: rgba(124,58,237,0.2); color: #A78BFA; border: 1px solid rgba(124,58,237,0.3); }
        .cupon-estado.canjeado{ background: rgba(16,185,129,0.2); color: #34D399; border: 1px solid rgba(16,185,129,0.3); }
        .cupon-estado.expirado{ background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }

        .cupon-divider { display: flex; align-items: center; }
        .cupon-notch { width: 20px; height: 20px; border-radius: 50%; background: var(--bg); flex-shrink: 0; }
        .cupon-dash { flex: 1; border-top: 2px dashed var(--border); }

        .cupon-body { padding: 18px 22px 20px; }
        .cupon-codigo { font-family: monospace; font-size: 1.6rem; font-weight: 900; letter-spacing: 6px; color: var(--text); margin-bottom: 10px; }
        .cupon-precios { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
        .cupon-original { font-size: 0.85rem; color: #EF4444; text-decoration: line-through; }
        .cupon-oferta { font-size: 1.3rem; font-weight: 900; color: var(--green); }
        .cupon-tiempo { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 14px; }

        .cupon-btn {
            display: block; width: 100%;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            color: #A78BFA;
            border-radius: 12px; padding: 12px;
            text-align: center; font-weight: 700; font-size: 0.88rem;
            cursor: pointer; transition: background 0.15s;
        }
        .cupon-btn:hover { background: rgba(124,58,237,0.25); }
        .cupon-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
        .empty-state .icon { font-size: 3.5rem; margin-bottom: 14px; }
        .empty-state p { font-size: 0.9rem; margin-bottom: 20px; }

        /* Modal cupón */
        .cupon-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 200;
            align-items: center; justify-content: center; padding: 20px;
        }
        .cupon-modal-overlay.open { display: flex; }
        .cupon-modal {
            background: var(--card);
            border: 1px solid var(--border-md);
            border-radius: 20px; overflow: hidden;
            width: 100%; max-width: 380px;
            animation: fadeUp 0.2s ease;
        }
        .cupon-modal-head {
            background: linear-gradient(90deg, #5B21B6, #9D174D);
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cupon-modal-head h3 { color: white; font-size: 1rem; font-weight: 800; margin: 0; }
        .cupon-modal-close {
            background: rgba(255,255,255,0.15); border: none; color: white;
            border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
            font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
        }
        .cupon-modal-body { padding: 20px; text-align: center; }
        .modal-negocio { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 3px; }
        .modal-nombre { font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 16px; }
        .modal-codigo {
            font-family: monospace; font-size: 1.6rem; font-weight: 900; letter-spacing: 6px;
            background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3);
            border-radius: 12px; padding: 10px 20px; display: inline-block;
            color: white; margin-bottom: 16px;
        }
        .modal-qr { width: 160px; height: 160px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 14px; }
        .modal-precios { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
        .modal-original { font-size: 0.85rem; color: #EF4444; text-decoration: line-through; }
        .modal-oferta { font-size: 1.5rem; font-weight: 900; color: var(--green); }
        .modal-tiempo { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 16px; }
        .modal-estado-badge {
            display: inline-block; border-radius: 20px; padding: 4px 14px;
            font-size: 0.75rem; font-weight: 700; margin-bottom: 16px;
        }
        .modal-footer { display: flex; gap: 8px; padding: 0 20px 20px; }
        .modal-wa-btn {
            flex: 1; background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.3);
            color: #25D366; border-radius: 10px; padding: 10px;
            text-align: center; font-weight: 700; font-size: 0.82rem;
            text-decoration: none; display: block;
        }
        .modal-wa-btn:hover { background: rgba(37,211,102,0.25); color: #25D366; }
        .modal-close-btn {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            color: var(--text-dim); border-radius: 10px; padding: 10px 16px;
            font-weight: 700; font-size: 0.82rem; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="page-wrap">

<header class="app-header">
    <div class="header-inner">
        <a class="brand" href="/">
            <img src="{{ url_for('static', filename='zuppon logo.png') }}" alt="Zuppon">
            ZupponPy
        </a>
        <div class="header-actions">
            <a href="/" class="header-btn"><i class="fas fa-arrow-left"></i> <span id="lblVolver">Volver</span></a>
        </div>
    </div>
</header>

<div class="page-content">
    <section class="hero-section" style="padding:20px 20px 16px;">
        <h1 style="font-size:1.5rem;">Mis Cupones</h1>
        <p id="subtitulo" style="color:var(--text-sub);font-size:0.9rem;">Cargando...</p>
    </section>

    <div id="cuponesGrid" class="cupones-grid"></div>
</div>

<footer>
    <p>&copy; 2026 ZupponPy — Todas las ofertas</p>
</footer>

</div><!-- /page-wrap -->

<!-- Modal detalle cupón -->
<div class="cupon-modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
    <div class="cupon-modal" id="modalCupon">
        <div class="cupon-modal-head">
            <h3><i class="fas fa-ticket-alt" style="margin-right:8px;"></i>Detalle del Cupón</h3>
            <button class="cupon-modal-close" onclick="cerrarModalDirecto()">✕</button>
        </div>
        <div class="cupon-modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<script>
function fmtTiempo(expira_en) {
    const diff = new Date(expira_en) - new Date();
    if (diff <= 0) return 'Expirado';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    if (h >= 24) return `${Math.floor(h/24)}d ${h%24}h restantes`;
    return `${h}h ${m}m restantes`;
}

let cdInterval = null;

function abrirModal(cupon) {
    const ahora = new Date();
    const expirado = new Date(cupon.expira_en) < ahora;
    const estadoLabel = cupon.canjeado ? '✓ Canjeado' : expirado ? 'Expirado' : '● Activo';
    const estadoColor = cupon.canjeado ? '#34D399' : expirado ? 'var(--text-dim)' : '#A78BFA';
    const estadoBg    = cupon.canjeado ? 'rgba(16,185,129,0.15)' : expirado ? 'rgba(255,255,255,0.05)' : 'rgba(124,58,237,0.15)';
    const waMsg = encodeURIComponent(`🎟️ Mi cupón: ${cupon.oferta_nombre}\nCódigo: ${cupon.codigo}\nPrecio: ${cupon.precio_oferta}`);
    const waUrl = cupon.negocio_whatsapp ? `https://wa.me/${cupon.negocio_whatsapp}?text=${waMsg}` : null;
    document.getElementById('modalBody').innerHTML = `
        <div class="modal-negocio">${cupon.negocio_nombre}</div>
        <div class="modal-nombre">${cupon.oferta_nombre}</div>
        <div class="modal-codigo">${cupon.codigo}</div>
        ${cupon.qr_base64 ? `<img src="data:image/png;base64,${cupon.qr_base64}" class="modal-qr">` : ''}
        <div class="modal-precios">
            ${cupon.precio_original ? `<span class="modal-original">${cupon.precio_original}</span>` : ''}
            <span class="modal-oferta">${cupon.precio_oferta}</span>
        </div>
        <div class="modal-tiempo" id="modalTiempo">
            <i class="fas fa-clock" style="margin-right:4px;"></i>${fmtTiempo(cupon.expira_en)}
        </div>
        <span class="modal-estado-badge" style="background:${estadoBg};color:${estadoColor};border:1px solid ${estadoColor}33;">
            ${estadoLabel}
        </span>`;
    document.getElementById('modalFooter').innerHTML = `
        ${waUrl && !cupon.canjeado && !expirado
            ? `<a href="${waUrl}" target="_blank" class="modal-wa-btn"><i class="fab fa-whatsapp" style="margin-right:6px;"></i>Presentar en WhatsApp</a>`
            : ''}
        <button class="modal-close-btn" onclick="cerrarModalDirecto()">Cerrar</button>`;
    document.getElementById('modalOverlay').classList.add('open');
    if (cdInterval) clearInterval(cdInterval);
    if (!expirado && !cupon.canjeado) {
        cdInterval = setInterval(() => {
            const el = document.getElementById('modalTiempo');
            if (el) el.innerHTML = `<i class="fas fa-clock" style="margin-right:4px;"></i>${fmtTiempo(cupon.expira_en)}`;
        }, 1000);
    }
}

function cerrarModal(e) {
    if (e.target === document.getElementById('modalOverlay')) cerrarModalDirecto();
}
function cerrarModalDirecto() {
    document.getElementById('modalOverlay').classList.remove('open');
    if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
}

async function cargarYRenderizar() {
    const grid = document.getElementById('cuponesGrid');
    const ahora = new Date();

    // 1. Migrar localStorage → DB
    const lsCupones = JSON.parse(localStorage.getItem('mis_cupones') || '[]');
    if (lsCupones.length > 0) {
        try {
            await fetch('/api/migrar-cupones-locales', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(lsCupones)
            });
        } catch(e) {}
    }

    // 2. Cargar desde DB
    let dbCupones = [];
    try {
        const res = await fetch('/api/mis-cupones');
        dbCupones = await res.json();
    } catch(e) {}

    // 3. Merge: DB primero, localStorage como fallback
    const dbCodigos = new Set(dbCupones.map(c => c.codigo));
    const soloLS = lsCupones.filter(c => !dbCodigos.has(c.codigo));
    const todos = [...dbCupones, ...soloLS]
        .filter(c => (ahora - new Date(c.expira_en)) < 7 * 24 * 3600 * 1000);

    localStorage.setItem('mis_cupones', JSON.stringify(todos));

    document.getElementById('subtitulo').textContent =
        todos.length === 0 ? 'No tenés cupones aún' : `${todos.length} cupón${todos.length !== 1 ? 'es' : ''}`;

    if (todos.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="icon">🎟️</div>
            <p>Todavía no reclamaste ningún cupón</p>
            <a href="/" style="background:var(--accent);color:white;border-radius:12px;padding:10px 24px;text-decoration:none;font-weight:700;font-size:0.85rem;">Ver ofertas</a>
        </div>`;
        return;
    }

    grid.innerHTML = todos.map((c, i) => {
        const expirado = new Date(c.expira_en) < ahora;
        const estadoClass = c.canjeado ? 'canjeado' : expirado ? 'expirado' : 'activo';
        const estadoLabel = c.canjeado ? '✓ Canjeado' : expirado ? 'Expirado' : '● Activo';
        return `<div class="cupon-card" onclick='abrirModal(${JSON.stringify(c)})'>
            <div class="cupon-head ${estadoClass}">
                ${c.oferta_imagen ? `<div class="cupon-head-bg" style="background-image:url('${c.oferta_imagen}')"></div><div class="cupon-head-overlay"></div>` : ''}
                <div class="cupon-negocio">${c.negocio_nombre}</div>
                <div class="cupon-nombre">${c.oferta_nombre}</div>
                <span class="cupon-estado ${estadoClass}">${estadoLabel}</span>
            </div>
            <div class="cupon-divider">
                <div class="cupon-notch"></div><div class="cupon-dash"></div><div class="cupon-notch"></div>
            </div>
            <div class="cupon-body">
                <div class="cupon-codigo">${c.codigo}</div>
                <div class="cupon-precios">
                    ${c.precio_original ? `<span class="cupon-original">${c.precio_original}</span>` : ''}
                    <span class="cupon-oferta">${c.precio_oferta}</span>
                </div>
                <div class="cupon-tiempo" id="cd-${i}">
                    <i class="fas fa-clock" style="margin-right:4px;"></i>${fmtTiempo(c.expira_en)}
                </div>
                <button class="cupon-btn ${c.canjeado || expirado ? 'disabled' : ''}">
                    <i class="fas fa-eye" style="margin-right:6px;"></i>Ver cupón
                </button>
            </div>
        </div>`;
    }).join('');

    todos.forEach((c, i) => {
        if (!c.canjeado && new Date(c.expira_en) > ahora) {
            setInterval(() => {
                const el = document.getElementById(`cd-${i}`);
                if (el) el.innerHTML = `<i class="fas fa-clock" style="margin-right:4px;"></i>${fmtTiempo(c.expira_en)}`;
            }, 1000);
        }
    });
}

cargarYRenderizar();
</script>
</body>
</html>
